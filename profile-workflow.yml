name: GitWorld — Update Profile

on:
  schedule:
    - cron: '0 18 * * *'   # Runs daily at 18:00 UTC
  workflow_dispatch:         # Allow manual trigger

jobs:
  gitworld:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate GitWorld SVG
        uses: Dasmat13/git-world-action@main
        with:
          github_user_name: ${{ github.actor }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          svg_out_path: dist/gitworld.svg

      - name: Commit & Push SVG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/gitworld.svg
          git diff --cached --quiet || git commit -m "🌍 Update GitWorld [$(date +'%Y-%m-%d')]"
          git push
